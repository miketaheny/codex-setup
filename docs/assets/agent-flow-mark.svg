<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Agent-Flow mark</title>
  <desc id="desc">A monogram-style Agent-Flow mark showing structured agent work moving through branch, devlog, review, and protected merge nodes.</desc>
  <defs>
    <linearGradient id="flowStroke" x1="96" y1="112" x2="416" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#168AAD"/>
      <stop offset="0.52" stop-color="#1F9D63"/>
      <stop offset="1" stop-color="#B7791F"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="74" y1="42" x2="438" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#182027"/>
      <stop offset="1" stop-color="#101418"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#D8DEE5" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.098 0 0 0 0 0.541 0 0 0 0 0.678 0 0 0 0.35 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="104" fill="url(#panelFill)"/>
  <rect x="28" y="28" width="456" height="456" rx="84" fill="url(#grid)" opacity="0.9"/>
  <rect x="62" y="62" width="388" height="388" rx="68" fill="none" stroke="#D8DEE5" stroke-opacity="0.12" stroke-width="2"/>

  <g filter="url(#softGlow)">
    <path d="M116 366L218 122L320 366" fill="none" stroke="url(#flowStroke)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M164 258H278" fill="none" stroke="#F7F8FA" stroke-opacity="0.88" stroke-width="20" stroke-linecap="round"/>
    <path d="M350 134V368" fill="none" stroke="#F7F8FA" stroke-opacity="0.9" stroke-width="28" stroke-linecap="round"/>
    <path d="M350 134H418" fill="none" stroke="#168AAD" stroke-width="28" stroke-linecap="round"/>
    <path d="M350 250H402" fill="none" stroke="#1F9D63" stroke-width="28" stroke-linecap="round"/>
  </g>

  <g>
    <circle cx="116" cy="366" r="18" fill="#101418" stroke="#168AAD" stroke-width="8"/>
    <circle cx="218" cy="122" r="18" fill="#101418" stroke="#1F9D63" stroke-width="8"/>
    <circle cx="320" cy="366" r="18" fill="#101418" stroke="#B7791F" stroke-width="8"/>
    <circle cx="418" cy="134" r="15" fill="#101418" stroke="#168AAD" stroke-width="7"/>
    <circle cx="402" cy="250" r="15" fill="#101418" stroke="#1F9D63" stroke-width="7"/>
  </g>

  <g transform="translate(370 314)">
    <rect x="0" y="22" width="56" height="48" rx="14" fill="#B7791F"/>
    <path d="M14 24V16C14 6 20 0 28 0C36 0 42 6 42 16V24" fill="none" stroke="#F7F8FA" stroke-width="8" stroke-linecap="round"/>
    <path d="M28 41V53" stroke="#101418" stroke-width="7" stroke-linecap="round"/>
  </g>
</svg>
